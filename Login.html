<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link href="./output.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="py-1.25 sticky top-0 bg-white"  >
  <div class="container mx-auto flex justify-between items-center 2xl:px-40 ">
    <div>
      <img src="./image/logo 1.png">
    </div>
    <div>
      <nav>
        <ul class="flex gap-1.25 ">
          <li>
            <button class="px-5.25 py-2  rounded-3xl bg-primary-color text-white font-primary-font text-[18px] font-semibold"><a href="./login.html">Login</a></button>
          </li>
          <li>
           <button class="px-5.25 py-2  rounded-3xl text-black transition  duration-400 ease-in-out  hover:bg-primary-color hover:text-white font-primary-font text-[18px] font-semibold "><a href="./Register.html">Register</a></button> 
          </li>

        </ul>
      </nav>
    </div>
  </div>
  
</header>
<main>
<section class="login-section">
  <div class="container">
    <div>
      <img src="./image/login1.png">
    </div>
    <div class="flex flex-col gap-7.5">
    <div class="flex flex-col gap-3.75">
      <h2 class="text-[64px] font-primary-font">Welcome</h2>
      <span class="font-primary-font">Login with Email</span>
    </div>
     <div class="flex flex-col gap-6.25">
      <input type="text" placeholder="Enter Email or Username" class="font-primary-font">
      <input type="text" placeholder="Enter Password" class="font-primary-font">
    </div>
    </div>

  </div>

</section>
</main>
</body>
</html>
