<main>
<section class="login-section pb-12.5">
  <div class="container mx-auto px-5 md:px-0 2xl:px-40  relative">
    <div class="absolute lg:top-0 md:top-3.75 right-1 ">
          <img src="./image/plane.svg">
        </div>
    <div class="grid grid-cols-1 md:grid-cols-2 items-stretch gap-5 lg:gap-0">
      <div>
        <img class="w-full h-full object-cover" src="./image/login1.png">
      </div>
      <div class="flex flex-col justify-between h-full">
        <div class="flex flex-col items-center text-center">
        <h2 class="text-[50px] md:text-[64px] font-semibold font-primary-font text-secondary-color leading-none mb-2.5 pt-12.5">Welcome</h2>
        <span class="text-text-color font-medium font-primary-font">Login with Email</span>
        <form class="flex flex-col gap-6.25 text-text-color font-primary-font w-full max-w-md mt-7.5">
          <div class="relative">
            <input type="text" placeholder="Enter Email or Username" class="peer w-full border-2 border-secondary-color rounded-lg pl-7.5 py-5 outline-none transition duration-500 focus:placeholder-transparent">
            <label class="absolute left-5 -top-3 bg-white px-2 text-[14px] text-text-color opacity-0 transition duration-500 peer-focus:opacity-100">Email</label>
          </div>

          <div class="relative">
            <input type="password" placeholder="Enter Password" class="peer w-full border-2 border-secondary-color rounded-lg pl-7.5 py-5 outline-none transition duration-500 focus:placeholder-transparent ">
            <label class="absolute left-5 -top-3 bg-white px-2 text-[14px] text-text-color opacity-0 transition duration-500 peer-focus:opacity-100">Password</label>
          </div>
          <div class="flex justify-end ">
           <button class="text-secondary-color text-[12px] font-medium font-primary-font">Forget your password?</button>
          </div>
          </form>
          <button class="bg-secondary-color mt-7.5 text-white py-2.5 px-20.5 rounded-md text-[18px] font-semibold ">LOGIN</button>
      
        <div class="flex items-center gap-2.5 mt-6.25">
          <div class="w-23.5 h-0.5 bg-secondary-color"></div>
          <span class="font-semibold font-primary-font text-secondary-color">OR</span>
          <div class="w-23.5 h-0.5 bg-secondary-color"></div>
        </div>
        <div class="flex gap-3.75 mt-3.75">
          <button class="border-2 border-secondary-color rounded-lg px-[22.7px] py-[9.47px] flex items-center justify-center"><img src="./image/google.svg"></button>
          <button class="border-2 border-secondary-color rounded-lg px-[22.7px] py-[9.47px] flex items-center justify-center "><img src="./image/facebook2.svg"></button>
          <button class="border-2 border-secondary-color rounded-lg px-[22.7px] py-[9.47px] flex items-center justify-center"><img src="./image/apple.svg" ></button>
        </div>
        </div>
        <button class="mt-3.75 text-[12px] text-text-color font-medium font-primary-font">Don't have account? <span class="text-secondary-color font-semibold">Register
          Now</span></button>
      
      <div class="flex justify-between w-full mt-15.25">
  <img src="./image/mosque.svg" class="w-full max-w-[30%]">
  <img src="./image/buildings.svg" class="w-full max-w-[30%]">
</div>
